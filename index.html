<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-image: url("https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&q=80&w=1920");
            --text-color: #2d3436;
            --box-bg: rgba(255, 255, 255, 0.85);
            --accent: #6c5ce7; 
            --item-bg: rgba(255, 255, 255, 0.5);
            --overdue-red: #ff7675;
            --overdue-bg: rgba(255, 118, 117, 0.2);
        }

        [data-theme="dark"] {
            --text-color: #dfe6e9;
            --box-bg: rgba(30, 30, 30, 0.9);
            --accent: #a29bfe;
            --item-bg: rgba(255, 255, 255, 0.05);
            --overdue-red: #ff4d4d;
            --overdue-bg: rgba(255, 77, 77, 0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            background: var(--bg-image);
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .box {
            position: relative;
            background: var(--box-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            width: 420px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 { 
            margin: 0; 
            font-weight: 600; 
            background: linear-gradient(45deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        #theme-btn, .clear-btn {
            background: var(--item-bg);
            border: 1px solid rgba(128,128,128,0.2);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: 0.3s;
        }

        .clear-btn:hover {
            background: #ff7675;
            color: white;
            border-color: #ff7675;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        input {
            background: var(--item-bg);
            border: 2px solid transparent;
            color: var(--text-color);
            padding: 12px;
            border-radius: 15px;
            outline: none;
            font-family: inherit;
        }

        input:focus { border-color: var(--accent); background: white; }
        [data-theme="dark"] input:focus { background: #2d3436; }

        #input { flex: 1; }

        .date-time-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .date-time-row input { flex: 1; font-size: 12px; }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        ul { padding: 0; max-height: 280px; overflow-y: auto; }

        li {
            list-style: none;
            padding: 15px;
            margin-bottom: 12px;
            background: var(--item-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .overdue {
            border: 2px solid var(--overdue-red) !important;
            background: var(--overdue-bg) !important;
        }

        .overdue-label {
            color: var(--overdue-red);
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: none;
        }

        .overdue .overdue-label {
            display: block;
        }

        .task-text { flex: 1; }
        .task-text span { display: block; font-size: 14px; }
        .task-text small { font-size: 11px; opacity: 0.6; }

        .done { text-decoration: line-through; opacity: 0.4; filter: grayscale(1); }

        .delete {
            background: transparent;
            color: #ff5f56;
            border: 1px solid #ff5f56;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
        }

        .delete:hover { background: #ff5f56; color: white; }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <h2>My Tasks</h2>
        <div class="controls">
            <button class="clear-btn" onclick="clearAll()">🧹 Clear</button>
            <button id="theme-btn" onclick="toggleTheme()">🌙 Mode</button>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="What needs doing?">
        <button class="add-btn" onclick="add()">Add</button>
    </div>

    <div class="date-time-row">
        <input type="date" id="date">
        <input type="time" id="time">
    </div>

    <ul id="list"></ul>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("theme-btn");
        const isDark = body.getAttribute("data-theme") === "dark";
        
        if (isDark) {
            body.removeAttribute("data-theme");
            btn.innerHTML = "🌙 ";
            localStorage.setItem("theme", "light");
        } else {
            body.setAttribute("data-theme", "dark");
            btn.innerHTML = " ☀️ ";
            localStorage.setItem("theme", "dark");
        }
    }

    function add() {
        let text = document.getElementById("input").value;
        let date = document.getElementById("date").value;
        let time = document.getElementById("time").value;

        if (text === ""){
            alert("Hey Macha do something!");
            return;
        }

        let li = document.createElement("li");
        
        let overdueClass = "";
        if (date && time) {
            let dueDateTime = new Date(date + "T" + time);
            let now = new Date();
            if (dueDateTime < now) {
                overdueClass = "overdue";
            }
        }

        if (overdueClass) li.classList.add(overdueClass);

        // DD-MM-YYYY Formatting
        let formattedDate = date ? date.split("-").reverse().join("-") : "No date";

        li.innerHTML = `
            <input type="checkbox" onchange="toggleDone(this)">
            <div class="task-text">
                <div class="overdue-label">⚠️ Overdue</div>
                <span>${text}</span>
                <small>${formattedDate} ${time ? '• ' + time : ''}</small>
            </div>
            <button class="delete" onclick="del(this)">Delete</button>
        `;

        document.getElementById("list").appendChild(li);
        save();

        document.getElementById("input").value = "";
        document.getElementById("date").value = "";
        document.getElementById("time").value = "";
    }

    function toggleDone(checkbox) {
        let li = checkbox.parentElement;
        let span = li.querySelector("span");
        if (checkbox.checked) {
            span.classList.add("done");
            li.classList.remove("overdue");
            checkbox.setAttribute("checked", "checked");
        } else {
            span.classList.remove("done");
            checkbox.removeAttribute("checked");
        }
        save();
    }

    function del(btn) {
        btn.parentElement.remove();
        save();
    }

    // 🧹 New Clear All Function
    function clearAll() {
        if (confirm("Are you sure you want to delete all tasks? This cannot be undone!")) {
            document.getElementById("list").innerHTML = "";
            localStorage.removeItem("taskDataV3");
        }
    }

    function save() {
        localStorage.setItem("taskDataV3", document.getElementById("list").innerHTML);
    }

    function load() {
        if (localStorage.getItem("theme") === "dark") {
            document.body.setAttribute("data-theme", "dark");
            document.getElementById("theme-btn").innerHTML = "☀️ Mode";
        }
        let data = localStorage.getItem("taskDataV3");
        if (data) document.getElementById("list").innerHTML = data;
    }

    window.onload = load;
</script>

</body>
</html>
